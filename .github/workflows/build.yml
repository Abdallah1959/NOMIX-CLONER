name: Build NOMIX Pro Installer

on:
  push:
    tags:
      - 'v*'   # يتم إنشاء الإصدار عند رفع Tag مثل v3.0.0
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      # سحب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # إعداد بايثون
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # تثبيت الاعتماديات
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      # عرض هيكل المشروع للتأكد من المسارات
      - name: Debug Repository Structure
        shell: pwsh
        run: |
          Write-Host "Listing repository structure..."
          Get-ChildItem -Recurse

      # التحقق من وجود الأيقونة
      - name: Verify Icon Exists
        shell: pwsh
        run: |
          if (Test-Path "assets/icon.ico") {
              Write-Host "Icon found: assets/icon.ico"
          }
          elseif (Test-Path "assets/NOMIXCLONER.ico") {
              Write-Host "Icon found: assets/NOMIXCLONER.ico"
          }
          else {
              Write-Error "Icon file not found in assets directory."
              exit 1
          }

      # تحديد مسار الأيقونة ديناميكياً
      - name: Set Icon Path
        id: icon
        shell: pwsh
        run: |
          if (Test-Path "assets/icon.ico") {
              echo "ICON_PATH=assets/icon.ico" >> $env:GITHUB_ENV
          }
          elseif (Test-Path "assets/NOMIXCLONER.ico") {
              echo "ICON_PATH=assets/NOMIXCLONER.ico" >> $env:GITHUB_ENV
          }

      # بناء الملف التنفيذي باستخدام Nuitka
      - name: Build Standalone with Nuitka
        run: >
          python -m nuitka main.py
          --standalone
          --assume-yes-for-downloads
          --windows-icon-from-ico=${{ env.ICON_PATH }}
          --windows-console-mode=force
          --enable-plugin=anti-bloat
          --output-dir=build_output
          --output-filename=NOMIX_CLONER.exe

      # التحقق من وجود Inno Setup
      - name: Verify Inno Setup Installation
        shell: pwsh
        run: |
          if (!(Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
              Write-Error "Inno Setup is not installed."
              exit 1
          }

      # إنشاء ملف التثبيت باستخدام Inno Setup
      - name: Compile Installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup.iss"

      # رفع ملف التثبيت كـ Artifact
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOMIX-Pro-Installer
          path: Output/NOMIX_V3_Installer.exe

      # إنشاء إصدار رسمي على GitHub
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/NOMIX_V3_Installer.exe
          name: NOMIX CLONER ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
