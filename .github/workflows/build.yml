name: Build NOMIX EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build with Nuitka (Enterprise Settings)
        run: >
          python -m nuitka main.py
          --standalone
          --onefile
          --assume-yes-for-downloads
          --enable-plugin=anti-bloat
          --windows-console-mode=force
          --output-filename=NOMIX_CLONER.exe
          --company-name="NOMIX"
          --product-name="NOMIX CLONER"
          --file-version="3.0.0"
          --product-version="3.0.0"
          --file-description="Enterprise Discord Automation Tool"

      - name: Upload Final EXE
        uses: actions/upload-artifact@v4
        with:
          name: NOMIX-CLONER-Windows
          path: NOMIX_CLONER.exe
