name: Build NOMIX Pro Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Verify Icon Exists
        shell: pwsh
        run: |
          if (!(Test-Path "assets/NOMIXCLONER.ico")) {
            Write-Error "Icon file not found: assets/NOMIXCLONER.ico"
            exit 1
          }

      - name: Build Standalone with Nuitka
        shell: pwsh
        run: |
          python -m nuitka main.py `
            --standalone `
            --assume-yes-for-downloads `
            --windows-icon-from-ico=assets/NOMIXCLONER.ico `
            --windows-console-mode=force `
            --enable-plugin=anti-bloat `
            --output-dir=build_output `
            --output-filename=NOMIX_CLONER.exe

      - name: Debug Build Output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse build_output

      - name: Compile Installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup.iss"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOMIX-Pro-Installer
          path: Output/NOMIX_V1_Installer.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/NOMIX_V1_Installer.exe
          name: NOMIX CLONER ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
