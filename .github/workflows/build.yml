name: Build NOMIX Pro Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka

      - name: Build Standalone
        run: >
          python -m nuitka main.py
          --standalone
          --windows-icon-from-ico=assets/icon.ico
          --windows-console-mode=force
          --output-dir=build_output
          --output-filename=NOMIX_CLONER.exe

      - name: Compile Pro Installer
        uses: ayoolatobi/innosetup-action@v1.2.2
        with:
          filepath: setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: NOMIX-Pro-Installer
          path: Output/NOMIX_V3_Installer.exe
