name: Build NOMIX Pro Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # سحب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4

      # إعداد بايثون
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # تثبيت الاعتماديات (تم إضافة discord-interactions)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py==1.7.3 aiohttp colorama keyauth requests qrcode discord-interactions
          pip install nuitka

      # التحقق من وجود الأيقونة
      - name: Verify Icon Exists
        shell: pwsh
        run: |
          if (!(Test-Path "assets/NOMIXCLONER.ico")) {
            Write-Error "Icon file not found: assets/NOMIXCLONER.ico"
            exit 1
          }

      # بناء الملف التنفيذي باستخدام Nuitka (تم دمج discord_interactions)
      - name: Build Standalone with Nuitka
        shell: pwsh
        run: |
          python -m nuitka main.py `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=anti-bloat `
            --windows-console-mode=force `
            --windows-icon-from-ico=assets/NOMIXCLONER.ico `
            --include-package=aiohttp `
            --include-package=discord `
            --include-package=requests `
            --include-package=colorama `
            --include-package=keyauth `
            --include-package=qrcode `
            --include-package=discord_interactions `
            --output-dir=build_output `
            --output-filename=NOMIX_CLONER.exe

      # عرض ناتج البناء للتأكد
      - name: Debug Build Output
        shell: pwsh
        run: |
          Get-ChildItem -Recurse build_output

      # التأكد من وجود Inno Setup
      - name: Verify Inno Setup Installation
        shell: pwsh
        run: |
          if (!(Test-Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe")) {
            Write-Error "Inno Setup is not installed."
            exit 1
          }

      # إنشاء ملف التثبيت
      - name: Compile Installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup.iss"

      # رفع المثبّت كملف Artifact
      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOMIX-Pro-Installer
          path: Output/NOMIX_CLONER_V1_Installer.exe

      # إنشاء إصدار رسمي على GitHub
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Output/NOMIX_CLONER_V1_Installer.exe
          name: NOMIX CLONER ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
